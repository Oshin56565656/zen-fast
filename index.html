<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastTrack AI Coach</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9165/9165743.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9165/9165743.png" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script>
      (function() {
        try {
          const state = JSON.parse(localStorage.getItem('fasttrack_state'));
          if (state && state.accentColor) {
            document.documentElement.style.setProperty('--accent-color', state.accentColor);
            document.querySelector('meta[name="theme-color"]').setAttribute('content', state.accentColor);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
